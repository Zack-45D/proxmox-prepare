- name: Create temporary directory for smartctl exporter
  file:
    path: /tmp/smartctl-exporter
    state: directory
    mode: "0755"
  when: smartctl_exporter_enabled

- name: Download smartctl exporter archive
  get_url:
    url: "https://github.com/prometheus-community/smartctl_exporter/releases/download/v{{ smartctl_exporter_version }}/smartctl_exporter-{{ smartctl_exporter_version }}.linux-{{ smartctl_exporter_arch }}.tar.gz"
    dest: "/tmp/smartctl-exporter/smartctl_exporter-{{ smartctl_exporter_version }}.linux-{{ smartctl_exporter_arch }}.tar.gz"
    mode: "0644"
  when: smartctl_exporter_enabled

- name: Extract smartctl exporter archive
  unarchive:
    src: "/tmp/smartctl-exporter/smartctl_exporter-{{ smartctl_exporter_version }}.linux-{{ smartctl_exporter_arch }}.tar.gz"
    dest: /tmp/smartctl-exporter
    remote_src: true
  when: smartctl_exporter_enabled

- name: Install smartctl exporter binary
  copy:
    src: "/tmp/smartctl-exporter/smartctl_exporter-{{ smartctl_exporter_version }}.linux-{{ smartctl_exporter_arch }}/smartctl_exporter"
    dest: "{{ smartctl_exporter_binary_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: smartctl_exporter_enabled

- name: Deploy smartctl exporter systemd service
  template:
    src: smartctl-exporter.service.j2
    dest: "/etc/systemd/system/{{ smartctl_exporter_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  when: smartctl_exporter_enabled

- name: Reload systemd for smartctl exporter
  systemd:
    daemon_reload: true
  when: smartctl_exporter_enabled

- name: Enable and start smartctl exporter
  systemd:
    name: "{{ smartctl_exporter_service_name }}"
    enabled: true
    state: started
  when: smartctl_exporter_enabled

- name: Check smartctl exporter endpoint
  uri:
    url: "http://{{ ansible_host }}:{{ smartctl_exporter_port }}/metrics"
    method: GET
    return_content: false
    status_code: 200
  register: smartctl_exporter_check
  changed_when: false
  when: smartctl_exporter_enabled

- name: Show smartctl exporter status
  debug:
    msg:
      - "smartctl exporter enabled: {{ smartctl_exporter_enabled }}"
      - "smartctl exporter reachable: {{ smartctl_exporter_check.status == 200 if smartctl_exporter_enabled else 'disabled' }}"
  when: smartctl_exporter_enabled