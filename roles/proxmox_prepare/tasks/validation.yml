- name: Check Proxmox API endpoint is reachable
  uri:
    url: "https://{{ ansible_host }}:{{ proxmox_api_port }}/api2/json/version"
    method: GET
    validate_certs: false
    return_content: false
    status_code: [200, 401]
  register: proxmox_api_check
  changed_when: false

- name: Check node exporter metrics endpoint
  uri:
    url: "http://{{ ansible_host }}:{{ node_exporter_port }}/metrics"
    method: GET
    return_content: true
    status_code: 200
  register: node_exporter_check
  changed_when: false
  when: node_exporter_enabled

- name: Check Ceph metrics endpoint
  uri:
    url: "http://{{ ansible_host }}:{{ ceph_metrics_port }}/metrics"
    method: GET
    return_content: false
    status_code: [200, 404]
  register: ceph_metrics_check
  changed_when: false
  failed_when: false
  when: ceph_validation_enabled

- name: Check for ZFS metrics in node exporter output
  set_fact:
    zfs_metrics_present: "{{ 'zfs_pool_health' in (node_exporter_check.content | default('')) }}"
  when:
    - zfs_textfile_enabled
    - node_exporter_enabled

- name: Show readiness summary
  debug:
    msg:
      - "Proxmox API reachable: {{ proxmox_api_check.status in [200, 401] }}"
      - "Node exporter reachable: {{ (node_exporter_check.status == 200) if node_exporter_enabled else 'disabled' }}"
      - "Ceph metrics reachable: {{ (ceph_metrics_check.status == 200) if ceph_validation_enabled else 'disabled' }}"
      - "ZFS metrics present in node exporter: {{ zfs_metrics_present if zfs_textfile_enabled else 'disabled' }}"